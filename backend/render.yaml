services:
  - type: web
    name: clinic-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_API_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTOMATION_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: VONAGE_FROM_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BLAND_API_KEY
        sync: false
      - key: BLAND_PHONE_NUMBER_ID
        sync: false
      - key: BLAND_VOICE_ID
        sync: false
      - key: SENTRY_BACKEND_DSN
        sync: false
