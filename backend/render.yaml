services:
  - type: web
    name: clinic-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node index.js
    envVars:
      - key: DATABASE_URL
        sync: false          # Paste your Neon postgres URL here
      - key: REDIS_URL
        sync: false          # Paste your Upstash redis URL here
      - key: JWT_SECRET
        sync: false
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # https://your-app.vercel.app
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTOMATION_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SENTRY_BACKEND_DSN
        sync: false
