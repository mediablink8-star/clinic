services:
  - type: web
    name: clinic-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VAPI_PRIVATE_KEY
        sync: false
      - key: AUTOMATION_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SENTRY_BACKEND_DSN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
