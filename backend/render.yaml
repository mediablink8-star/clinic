services:
  - type: web
    name: clinic-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npx prisma migrate deploy
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTOMATION_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: SENTRY_BACKEND_DSN
        sync: false
