version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mbas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mbas_user
      POSTGRES_PASSWORD: mbas_password
      POSTGRES_DB: mbas_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbas_user -d mbas_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mbas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
