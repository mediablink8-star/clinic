version: '3.8'

services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-supersecret}
      - VITE_API_BASE_URL=http://localhost:4000/api
    volumes:
      - ./backend/prisma/dev.db:/app/backend/prisma/dev.db

  # Optional: Redis for future BullMQ integration mentioned in previous conversations
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
