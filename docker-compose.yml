services:
  db:
    image: postgres:15-alpine
    container_name: mbas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mbas_user
      POSTGRES_PASSWORD: mbas_password
      POSTGRES_DB: mbas_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbas_user -d mbas_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mbas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mbas-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mbas_user:mbas_password@db:5432/mbas_database?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production

volumes:
  postgres_data:
  redis_data:
